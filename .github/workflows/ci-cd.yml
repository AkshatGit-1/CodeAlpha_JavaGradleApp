name: Java CI/CD Pipeline with Gradle

# ── Trigger Conditions ──────────────────────────────────────
on:
  push:
    branches:
      - main        # main branch pe push hone pe
      - develop     # develop branch pe push hone pe
  pull_request:
    branches:
      - main        # main mein PR aane pe
  workflow_dispatch:  # Manual trigger bhi kar sako

# ── Jobs ────────────────────────────────────────────────────
jobs:

  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest 

    steps:

      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.5.1'

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Build Project
        run: ./gradlew build --no-daemon

      - name: Run All Tests
        run: ./gradlew test --no-daemon

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()  
        with:
          name: test-reports
          path: build/reports/tests/

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: application-jar
          path: build/libs/*.jar

  code-quality:
    name: Code Quality Check
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.5.1'

      - name: Make gradlew Executable
        run: chmod +x gradlew

      - name: Check Project Dependencies
        run: ./gradlew dependencies --no-daemon

      - name: Verify Build Info
        run: ./gradlew projectInfo --no-daemon

  pipeline-status:
    name: Pipeline Status Report
    runs-on: ubuntu-latest
    needs: [build-and-test, code-quality]
    if: always()    

    steps:
      - name: Pipeline Success Message
        if: ${{ needs.build-and-test.result == 'success' && needs.code-quality.result == 'success' }}
        run: |
          echo "============================================"
          echo "✅ CI/CD PIPELINE SUCCESSFUL!"
          echo "============================================"
          echo "Project  : CodeAlpha Java Gradle App"
          echo "Build    : PASSED ✅"
          echo "Tests    : PASSED ✅"
          echo "Quality  : PASSED ✅"
          echo "Status   : Ready for Deployment! 🚀"
          echo "============================================"

      - name: Pipeline Failure Message
        if: ${{ needs.build-and-test.result == 'failure' || needs.code-quality.result == 'failure' }}
        run: |
          echo "============================================"
          echo "❌ CI/CD PIPELINE FAILED!"
          echo "============================================"
          echo "Please check the logs above!"
          echo "Fix the issues and push again!"
          echo "============================================"
          exit 1